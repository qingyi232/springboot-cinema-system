server:
  ip: ${SERVER_IP:localhost}
  port: ${SERVER_PORT:1000}

spring:
  main:
    allow-circular-references: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/movie_booking_system?useUnicode=true&useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 1000MB
  jackson:
    date-format: "yyyy-MM-dd HH:mm:ss"
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai

mybatis:
  mapper-locations: classpath:mapper/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  logging:
    level: debug

resetPassword: ${RESET_PASSWORD:123456}

security:
  jwt:
    secret: ${JWT_SECRET:movie-booking-system-dev-secret}
  retrieve-code:
    expire-seconds: ${RETRIEVE_CODE_EXPIRE_SECONDS:300}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

files:
  uploads:
    path: ${FILES_UPLOADS_PATH:uploads/}
    baseUrl: ${FILES_UPLOADS_BASE_URL:}
